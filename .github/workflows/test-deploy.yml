name: Test Environment Deploy (Tencent Cloud)

on:
  push:
    branches: [develop]
    paths:
      - 'server/**'
      - 'shared/**'
      - '.github/workflows/test-deploy.yml'

jobs:
  deploy-to-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Lint server code
        run: |
          pip install flake8
          flake8 server/ shared/ --max-line-length=120 --ignore=E501,W503 --exclude=server/alembic/versions/
      
      - name: Deploy to Tencent Cloud via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 122.51.72.36
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /app/AHDUNYI_Terminal_PRO

            # 切换到develop分支
            git fetch origin
            git checkout develop
            git pull origin develop

            # 复制测试环境配置文件
            if [ -f ".env.test" ]; then
              cp .env.test server/.env
            fi

            # 创建测试环境虚拟环境（如果不存在）
            if [ ! -d "server/venv" ]; then
              python3 -m venv server/venv
            fi

            # 安装依赖
            server/venv/bin/pip install -r server/requirements.txt -q

            # 执行数据库迁移（忽略表已存在的错误，不中断部署）
            cd server
            export ENVIRONMENT=test
            venv/bin/python -m alembic upgrade head || echo "Migration skipped (already up to date)"
            cd ..

            # 初始化测试数据（忽略已存在错误，不中断部署）
            server/venv/bin/python -m server.db.init_db || echo "init_db skipped (already initialized)"

            # 重启服务
            sudo systemctl daemon-reload
            sudo systemctl restart ahdunyi-test-api

            # 检查服务状态
            sleep 3
            sudo systemctl status ahdunyi-test-api --no-pager

            echo "Deploy completed: $(date)"
