name: Server Deploy (Aliyun)

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'shared/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint server code
        run: |
          pip install flake8
          flake8 server/ shared/ --max-line-length=120 --ignore=E501,W503

      - name: Deploy to Aliyun via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            cd /app/AHDUNYI_Terminal_PRO
            
            # 使用 OpenClaw 创建的专用虚拟环境的 pip 来安装依赖
            if [ -f "server/requirements.txt" ]; then
              /app/AHDUNYI_Terminal_PRO/server/venv/bin/pip install -r server/requirements.txt
            fi
            
            # 重启服务
            systemctl daemon-reload
            systemctl restart ahdunyi-api
            echo "✅ 部署完成，服务已重启: $(date)"
            
